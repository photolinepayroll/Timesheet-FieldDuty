<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Timesheet & Expenses</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧾</text></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    .emp-tabs { display:flex; gap:6px; margin-bottom:18px; flex-wrap:wrap; }
    .emp-tab  { padding:8px 20px; border:1.5px solid var(--blue2,#1a73e8); border-radius:4px;
                background:#fff; cursor:pointer; font-weight:600; color:var(--blue2,#1a73e8); }
    .emp-tab.active { background:var(--blue2,#1a73e8); color:#fff; }
    .claim-status-badge { padding:2px 10px; border-radius:12px; font-size:.82em; font-weight:600; display:inline-block; }
    .claim-status-approved  { background:#d4f7d4; color:#1a6e1a; }
    .claim-status-submitted { background:#fff3cd; color:#7a5a00; }
    .claim-status-rejected  { background:#ffd6d6; color:#8b0000; }
    #emp-inline-claim { display:none; }
    .emp-claim-btn { font-size:.78em; padding:3px 9px; cursor:pointer; }
    #cl-date[disabled] { background:#f0f0f0; opacity:.85; }
  </style>
</head>
<body>
  <div id="login-view" class="card" style="max-width:360px;margin:60px auto;">
    <div style="text-align:center;margin-bottom:4px;">
      <div style="font-size:1.5em;font-weight:700;color:var(--blue2);line-height:1.25;">Timesheet &amp; Expenses</div>
      <div style="font-size:0.82em;color:#5a6b8c;margin-top:2px;letter-spacing:.02em;">A.Head + Tech + Auditors</div>
    </div>
    <label for="inp-name">Name</label>
    <input id="inp-name" type="text" placeholder="Your full name" style="width:100%;margin:6px 0 12px;">
    <label for="inp-pin">PIN</label>
    <input id="inp-pin" type="password" maxlength="4" placeholder="4-digit PIN" style="width:100%;margin:6px 0 12px;">
    <button id="btn-login" style="width:100%;">Login</button>
    <p id="login-error" style="color:red;text-align:center;margin-top:8px;"></p>
  </div>

  <div id="employee-view" style="display:none;max-width:980px;margin:24px auto;padding:16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <h3 id="welcome-msg"></h3>
      <button onclick="logout()">Logout</button>
    </div>

    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
      <label style="font-weight:600;">Period:</label>
      <input id="inp-period-start" type="date" style="padding:6px;">
      <span>—</span>
      <input id="inp-period-end" type="date" style="padding:6px;">
      <button onclick="loadCurrentTab()" style="padding:6px 16px;">Load</button>
    </div>

    <div class="emp-tabs">
      <button class="emp-tab active" id="tab-btn-sheet"      onclick="switchTab('sheet')">Timesheet</button>
      <button class="emp-tab"        id="tab-btn-claims"     onclick="switchTab('claims')">Expense Claims</button>
      <button class="emp-tab"        id="tab-btn-attendance" onclick="switchTab('attendance')">Attendance</button>
    </div>

    <!-- Tab 1: Timesheet -->
    <div id="tab-sheet">
      <div id="emp-period-sheet"><p style="color:#888;">Select a date range above and click Load.</p></div>

      <!-- Inline claim form — revealed when employee clicks + Fare / + Accom -->
      <div id="emp-inline-claim" class="card" style="max-width:500px;margin-top:18px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <b id="cl-form-title">Submit Claim</b>
          <button onclick="hideClaimForm()" style="background:none;border:none;font-size:1.3em;cursor:pointer;line-height:1;">✕</button>
        </div>
        <label>Date</label>
        <select id="cl-date" style="width:100%;padding:7px;margin:4px 0 10px;"></select>
        <input id="cl-type" type="hidden">
        <div id="cl-fare-fields">
          <label>From</label>
          <input id="cl-from" type="text" placeholder="Starting point" style="width:100%;padding:7px;margin:4px 0 10px;">
          <label>To</label>
          <input id="cl-to" type="text" placeholder="Destination" style="width:100%;padding:7px;margin:4px 0 10px;">
          <label>Vehicle / Mode</label>
          <select id="cl-mode" onchange="onModeChange()" style="width:100%;padding:7px;margin:4px 0 10px;">
            <option value="">Select mode…</option>
            <option value="Jeepney">Jeepney</option>
            <option value="Tricycle">Tricycle</option>
            <option value="FX">FX</option>
            <option value="Company Service">Company Service</option>
            <option value="LAND">LAND</option>
            <option value="SEA">SEA</option>
            <option value="AIR">AIR</option>
            <option value="GAS EXPENSE">GAS EXPENSE</option>
          </select>
        </div>
        <label>Amount (₱)</label>
        <input id="cl-amount" type="number" min="0" style="width:100%;padding:7px;margin:4px 0 10px;">
        <label id="cl-notes-label">Notes / Justification</label>
        <textarea id="cl-notes" rows="2" style="width:100%;padding:7px;margin:4px 0 10px;"></textarea>
        <div id="cl-receipt-row">
          <label id="cl-receipt-label">Receipt Photo (optional)</label>
          <input id="cl-receipt" type="file" accept="image/*" style="margin:4px 0 12px;">
        </div>
        <button id="cl-submit-btn" onclick="submitClaim()" style="width:100%;">Submit Fare Expenses</button>
        <p id="cl-msg" style="margin-top:8px;color:green;"></p>
      </div>
    </div>

    <!-- Tab 2: Expense Claims -->
    <div id="tab-claims" style="display:none;">
      <div id="emp-claims-list"><p style="color:#888;">Select a date range above and click Load.</p></div>
    </div>

    <!-- Tab 3: Attendance -->
    <div id="tab-attendance" style="display:none;">
      <div id="emp-attendance-list"><p style="color:#888;">Select a date range above and click Load.</p></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('btn-login').addEventListener('click', function() {
        var name = document.getElementById('inp-name').value.trim();
        var pin  = document.getElementById('inp-pin').value.trim();
        if (!name || !pin) { document.getElementById('login-error').textContent = 'Enter name and PIN.'; return; }
        var btn = document.getElementById('btn-login');
        btn.disabled = true;
        btn.textContent = 'Logging in…';
        document.getElementById('login-error').textContent = '';
        login(name, pin, function(err, user) {
          if (err) {
            btn.disabled = false;
            btn.textContent = 'Login';
            document.getElementById('login-error').textContent = err.message;
            return;
          }
          if (user.role === 'head') { window.location.href = 'admin.html'; return; }
          document.getElementById('login-view').style.display   = 'none';
          document.getElementById('employee-view').style.display = 'block';
          document.getElementById('welcome-msg').textContent = 'Welcome, ' + user.name;
          loadEmployeeConfig(user);
        });
      });

      // Event delegation for + Fare / + Accom per-row buttons in the period sheet.
      // Attached once to the stable #emp-period-sheet container — the container
      // itself never gets replaced (only its innerHTML), so delegation survives
      // every period-sheet re-render without re-attaching.
      document.getElementById('emp-period-sheet').addEventListener('click', function(ev) {
        var btn = ev.target.closest('.emp-claim-btn');
        if (!btn) return;
        openClaimForm(btn.dataset.date, btn.dataset.type);
      });
    });

    // ---- Tab switching ----
    function switchTab(tab) {
      ['sheet', 'claims', 'attendance'].forEach(function(t) {
        document.getElementById('tab-' + t).style.display = (t === tab) ? 'block' : 'none';
        document.getElementById('tab-btn-' + t).classList.toggle('active', t === tab);
      });
      // No auto-load on tab switch — employee must press Load to fetch data.
    }

    // ---- Load on demand ----
    function loadCurrentTab() {
      var user  = currentUser();
      var start = document.getElementById('inp-period-start').value;
      var end   = document.getElementById('inp-period-end').value;
      if (!start || !end) { alert('Please select a date range first.'); return; }
      // Keep _plConfig in sync so saveClaim uses the selected range
      if (!window._plConfig) window._plConfig = {};
      window._plConfig.period_start = start;
      window._plConfig.period_end   = end;
      var active = document.querySelector('.emp-tab.active');
      var tabId  = active ? active.id.replace('tab-btn-', '') : 'sheet';
      if (tabId === 'sheet')      loadEmployeePeriodSheet(user, { period_start: start, period_end: end });
      if (tabId === 'claims')     loadMyClaims(user);
      if (tabId === 'attendance') loadAttendance(user, { period_start: start, period_end: end });
    }

    // ---- Inline claim form ----
    function openClaimForm(date, type) {
      var sheet   = window._lastPeriodSheet;
      var dates   = sheet ? sheet.rows.map(function(r) { return r.date; }) : [];
      var dateSel = document.getElementById('cl-date');
      dateSel.innerHTML = dates.map(function(d) {
        return '<option value="' + d + '">' + d + '</option>';
      }).join('');
      if (date) {
        dateSel.value = date;
        dateSel.setAttribute('disabled', 'disabled');
      } else {
        dateSel.removeAttribute('disabled');
      }
      document.getElementById('cl-type').value = type;
      var formCaption = type === 'accommodation' ? 'Submit Accommodation Expenses' : 'Submit Fare Expenses';
      document.getElementById('cl-form-title').textContent = formCaption;
      document.getElementById('cl-submit-btn').textContent = formCaption;
      // Show FROM/TO/MODE only for fare claims
      document.getElementById('cl-fare-fields').style.display =
        type === 'accommodation' ? 'none' : 'block';
      document.getElementById('cl-from').value   = '';
      document.getElementById('cl-to').value     = '';
      document.getElementById('cl-mode').value   = '';
      document.getElementById('cl-amount').value = '';
      document.getElementById('cl-amount').removeAttribute('readonly');
      document.getElementById('cl-notes').value  = '';
      document.getElementById('cl-receipt').value = '';
      document.getElementById('cl-msg').textContent = '';
      updateReceiptVisibility();
      var form = document.getElementById('emp-inline-claim');
      form.style.display = 'block';
      form.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // Jeepney/Tricycle/FX/Company Service never issue a usable receipt and
    // need no note — exempt from both. LAND/SEA/AIR/GAS EXPENSE are broad
    // catch-all categories (could be a bus, a company car, a specific gas
    // station, etc.) — a receipt alone doesn't say which, so both a receipt
    // AND a note naming the actual vehicle/gas station are required for
    // audit. Accommodation claims are unaffected — Receipt Photo stays
    // visible-but-optional, Notes stays optional, as always.
    var RECEIPT_REQUIRED_MODES = ['LAND', 'SEA', 'AIR', 'GAS EXPENSE'];
    var NOTE_REQUIRED_MODES    = RECEIPT_REQUIRED_MODES;

    function updateReceiptVisibility() {
      var claimType = document.getElementById('cl-type').value;
      var mode      = document.getElementById('cl-mode').value;
      var required  = RECEIPT_REQUIRED_MODES.indexOf(mode) !== -1;
      var show      = claimType === 'accommodation' || required;
      document.getElementById('cl-receipt-row').style.display = show ? 'block' : 'none';
      document.getElementById('cl-receipt-label').textContent =
        required ? 'Receipt Photo (required)' : 'Receipt Photo (optional)';
      var noteRequired = NOTE_REQUIRED_MODES.indexOf(mode) !== -1;
      document.getElementById('cl-notes-label').textContent = noteRequired
        ? 'Notes / Justification (required — specify vehicle or gas station)'
        : 'Notes / Justification';
    }

    function onModeChange() {
      var mode = document.getElementById('cl-mode').value;
      var amountEl = document.getElementById('cl-amount');
      if (mode === 'Company Service') {
        amountEl.value = '0';
        amountEl.setAttribute('readonly', 'readonly');
      } else {
        amountEl.removeAttribute('readonly');
        if (amountEl.value === '0') amountEl.value = '';
      }
      updateReceiptVisibility();
    }

    function hideClaimForm() {
      document.getElementById('emp-inline-claim').style.display = 'none';
    }

    function submitClaim() {
      var user      = currentUser();
      var dateVal   = document.getElementById('cl-date').value;
      var claimType = document.getElementById('cl-type').value;
      var mode      = document.getElementById('cl-mode').value;
      var amount    = parseFloat(document.getElementById('cl-amount').value);
      if (!dateVal) {
        alert('Date is required.');
        return;
      }
      if (claimType === 'special-fare' && !mode) {
        alert('Please select a vehicle/mode.');
        return;
      }
      var amountRequired = !(claimType === 'special-fare' && mode === 'Company Service');
      if (amountRequired && (isNaN(amount) || amount <= 0)) {
        alert('Amount is required.');
        return;
      }
      if (isNaN(amount)) amount = 0;
      if (claimType === 'special-fare' && NOTE_REQUIRED_MODES.indexOf(mode) !== -1 &&
          !document.getElementById('cl-notes').value.trim()) {
        alert('Please specify the vehicle or gas station in Notes for ' + mode + '.');
        return;
      }
      if (claimType === 'special-fare' && RECEIPT_REQUIRED_MODES.indexOf(mode) !== -1 &&
          !document.getElementById('cl-receipt').files[0]) {
        alert('Receipt photo is required for ' + mode + '.');
        return;
      }
      var config = getStoredConfig();
      var claim = {
        employee_name:   user.name,
        date:            dateVal,
        period_start:    config ? config.period_start : '',
        period_end:      config ? config.period_end   : '',
        type:            claimType,
        from_loc:        document.getElementById('cl-from').value.trim(),
        to_loc:          document.getElementById('cl-to').value.trim(),
        vehicle_mode:    document.getElementById('cl-mode').value.trim(),
        distance_km:     '',
        computed_amount: '',
        claimed_amount:  amount,
        receipt_url:     '',
        gps_check:       'n/a',
        status:          'Submitted',
        approver_name:   '',
        approved_at:     '',
        notes:           document.getElementById('cl-notes').value.trim()
      };
      // Receipt: compress to a standard-doc-quality JPEG, then convert to
      // base64. Google Sheets cells cap at ~50,000 characters; an
      // uncompressed phone photo can run into the millions of characters
      // and fail or get truncated silently, so resizing/re-encoding here
      // (rather than uploading the raw file) is required, not cosmetic.
      var file = document.getElementById('cl-receipt').files[0];
      if (file) {
        compressReceiptImage(file, function(dataUrl) {
          claim.receipt_url = dataUrl;
          finishSubmitClaim(claim);
        });
      } else {
        finishSubmitClaim(claim);
      }
    }

    // Resizes to a max 1600px side and re-encodes as JPEG @ 70% quality —
    // plenty for a legible receipt, well under the Sheets cell-size cap.
    function compressReceiptImage(file, cb) {
      var reader = new FileReader();
      reader.onload = function(ev) {
        var img = new Image();
        img.onload = function() {
          var maxSide = 1600;
          var scale = Math.min(1, maxSide / Math.max(img.width, img.height));
          var canvas = document.createElement('canvas');
          canvas.width = Math.round(img.width * scale);
          canvas.height = Math.round(img.height * scale);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          cb(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.onerror = function() { cb(ev.target.result); }; // fall back to uncompressed on decode failure
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    function finishSubmitClaim(claim) {
      api('saveClaim', { claim: claim }, function(err, id) {
        if (err) { alert(err.message); return; }
        document.getElementById('cl-msg').textContent = 'Submitted! ID: ' + id;
        var user = currentUser();
        var cfg  = getStoredConfig();
        // Brief pause so user sees the confirmation, then reload period sheet
        setTimeout(function() {
          hideClaimForm();
          loadEmployeePeriodSheet(user, cfg);
        }, 1500);
      });
    }

    // ---- Config / period sheet ----
    function getStoredConfig() {
      return window._plConfig || null;
    }

    function loadEmployeeConfig(user) {
      api('getConfig', {}, function(err, data) {
        if (err) return;
        window._plConfig = {};
        data.forEach(function(row) { window._plConfig[row.key] = row.value; });
        // Date inputs stay blank on every login — the employee types/picks
        // the period manually, then presses Load when ready.
      });
    }

    // Auto-loads the logged-in employee's own period sheet for the current
    // period. employee_name is always sourced from the session (user.name,
    // set at login by the server's handleLogin response) — never from any
    // user-editable form field, URL parameter, or other client-controlled
    // input — so an employee cannot view another employee's data.
    function loadEmployeePeriodSheet(user, config) {
      var out = document.getElementById('emp-period-sheet');
      out.innerHTML = '<p>Loading your period sheet…</p>';
      api('getPeriodSheet', {
        employee_name: user.name,
        period_start:  config.period_start,
        period_end:    config.period_end
      }, function(err, sheet) {
        if (err) { out.innerHTML = '<p style="color:red;">' + escapeHtml(err.message) + '</p>'; return; }
        window._lastPeriodSheet = sheet;
        out.innerHTML = renderPeriodSheet(sheet, { employeeControls: true });
      });
    }

    // ---- Expense Claims tab ----
    function loadMyClaims(user) {
      var out = document.getElementById('emp-claims-list');
      out.innerHTML = '<p>Loading your claims…</p>';
      api('getClaims', { employee_name: user.name }, function(err, claims) {
        if (err) { out.innerHTML = '<p style="color:red;">' + escapeHtml(err.message) + '</p>'; return; }
        if (!claims || !claims.length) { out.innerHTML = '<p>No claims submitted yet.</p>'; return; }
        claims.sort(function(a, b) { return a.date < b.date ? 1 : -1; }); // newest-first
        var html = '<div class="table-scroll"><table>' +
          '<thead><tr><th>DATE</th><th>TYPE</th><th>FROM → TO</th><th>MODE</th><th>AMOUNT</th><th>STATUS</th></tr></thead><tbody>';
        claims.forEach(function(c) {
          var sc = (c.status || '').toLowerCase();
          var route = (c.from_loc || '') + (c.to_loc ? ' → ' + c.to_loc : '');
          html += '<tr>' +
            '<td>' + escapeHtml(c.date || '') + '</td>' +
            '<td>' + escapeHtml(c.type || '') + '</td>' +
            '<td>' + escapeHtml(route) + '</td>' +
            '<td>' + escapeHtml(c.vehicle_mode || '') + '</td>' +
            '<td>' + formatCurrency(c.claimed_amount) + '</td>' +
            '<td><span class="claim-status-badge claim-status-' + escapeHtml(sc) + '">' + escapeHtml(c.status || '') + '</span></td>' +
            '</tr>';
        });
        html += '</tbody></table></div>';
        out.innerHTML = html;
      });
    }

    // ---- Attendance tab ----
    function loadAttendance(user, config) {
      var out = document.getElementById('emp-attendance-list');
      if (!config) { out.innerHTML = '<p>Config not loaded yet — try again in a moment.</p>'; return; }
      out.innerHTML = '<p>Loading attendance…</p>';
      api('getAttendance', {
        employee_name: user.name,
        period_start:  config.period_start,
        period_end:    config.period_end
      }, function(err, records) {
        if (err) { out.innerHTML = '<p style="color:red;">' + escapeHtml(err.message) + '</p>'; return; }
        if (!records || !records.length) { out.innerHTML = '<p>No attendance records found for this period.</p>'; return; }
        records.sort(function(a, b) { return a.timestamp > b.timestamp ? 1 : -1; });
        var html = '<div class="table-scroll"><table>' +
          '<thead><tr><th>DATE</th><th>TIME</th><th>TYPE</th><th>DESTINATION</th><th>GPS</th></tr></thead><tbody>';
        records.forEach(function(r) {
          var ts   = r.timestamp || '';
          var sep  = ts.indexOf('T') !== -1 ? 'T' : ' ';
          var date = ts.split(sep)[0] || '';
          var time = (ts.split(sep)[1] || '').substring(0, 5); // HH:MM
          var lat  = parseFloat(r.lat  || 0);
          var lng  = parseFloat(r.lng  || 0);
          var gps  = (lat || lng) ? (lat.toFixed(4) + ', ' + lng.toFixed(4)) : '—';
          html += '<tr>' +
            '<td>' + escapeHtml(date) + '</td>' +
            '<td>' + escapeHtml(time) + '</td>' +
            '<td>' + escapeHtml(r.type || '') + '</td>' +
            '<td>' + escapeHtml(r.destination || '') + '</td>' +
            '<td style="font-size:.82em;color:#555;">' + escapeHtml(gps) + '</td>' +
            '</tr>';
        });
        html += '</tbody></table></div>';
        out.innerHTML = html;
      });
    }
  </script>
</body>
</html>
