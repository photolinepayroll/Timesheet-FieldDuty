<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Timesheet & Expenses — Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧾</text></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    .match-badge { padding:2px 10px; border-radius:12px; font-size:.82em; font-weight:600; display:inline-block; }
    .match-ok    { background:#d4f7d4; color:#1a6e1a; }
    .match-warn  { background:#fff3cd; color:#7a5a00; }
    .match-bad   { background:#ffd6d6; color:#8b0000; }
  </style>
</head>
<body>
  <div style="max-width:1100px;margin:0 auto;padding:16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div>
        <div style="font-size:1.3em;font-weight:700;color:var(--blue2);line-height:1.2;">Timesheet &amp; Expenses — Admin</div>
        <div style="font-size:0.78em;color:#5a6b8c;margin-top:1px;">A.Head + Tech + Auditors</div>
      </div>
      <button onclick="logout()" style="padding:6px 14px;">Logout</button>
    </div>

    <!-- Tab bar -->
    <div id="tabs" style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;">
      <button class="tab-btn active" data-tab="employees">Employees</button>
      <button class="tab-btn" data-tab="rates">Rate Tables</button>
      <button class="tab-btn" data-tab="claims">Approve Claims</button>
      <button class="tab-btn" data-tab="periods">Employee Timesheet</button>
    </div>

    <!-- Tab: Employees -->
    <div id="tab-employees" class="tab-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="section-title">Employee Profiles</div>
        <div style="display:flex;gap:8px;">
          <button id="btn-check-names" onclick="checkNameMatches()">Check Name Matches</button>
          <button onclick="openUserForm(null)">+ Add Employee</button>
        </div>
      </div>
      <div class="table-scroll">
        <table id="users-table">
          <thead><tr>
            <th>Name</th><th>Dept</th><th>Mother Branch</th>
            <th>Level</th><th>Role</th><th>Active</th><th>Actions</th>
          </tr></thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>

      <div id="name-match-results" style="margin-top:16px;"></div>

      <!-- User form (hidden until opened) -->
      <div id="user-form-wrap" style="display:none;background:#f9f9f9;padding:16px;margin-top:16px;border:1px solid #ddd;border-radius:6px;">
        <div class="section-title" id="user-form-title">Add Employee</div>
        <input type="hidden" id="uf-id">
        <label>Full Name</label>
        <input id="uf-name" type="text" style="width:100%;padding:7px;margin:4px 0 10px;">
        <label>Department</label>
        <div id="uf-dept-wrap" style="margin:4px 0 10px;">
          <input id="uf-dept" type="text" style="width:100%;padding:7px;box-sizing:border-box;">
        </div>
        <label>Mother Branch</label>
        <input id="uf-branch" type="text" style="width:100%;padding:7px;margin:4px 0 10px;">
        <label>Position Level</label>
        <select id="uf-level" style="width:100%;padding:7px;margin:4px 0 10px;">
          <option value="level_1">Level 1</option>
          <option value="level_2">Level 2</option>
          <option value="level_3">Level 3</option>
        </select>
        <label>Role</label>
        <select id="uf-role" style="width:100%;padding:7px;margin:4px 0 10px;">
          <option value="employee">Employee</option>
          <option value="head">Head (can approve)</option>
        </select>
        <label>PIN (4 digits)</label>
        <input id="uf-pin" type="text" maxlength="4" style="width:100%;padding:7px;margin:4px 0 10px;">
        <label style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
          <input id="uf-active" type="checkbox" checked> Active
        </label>
        <div style="display:flex;gap:8px;">
          <button id="btn-save-user" onclick="saveUser()">Save</button>
          <button onclick="document.getElementById('user-form-wrap').style.display='none'">Cancel</button>
        </div>
        <p id="uf-msg" style="color:green;margin-top:8px;"></p>
      </div>
    </div>

    <!-- Tab: Rate Tables -->
    <div id="tab-rates" class="tab-panel" style="display:none;">
      <div id="rates-tables"></div>
    </div>

    <!-- Tab: Approve Claims -->
    <div id="tab-claims" class="tab-panel" style="display:none;">
      <div class="section-title">Pending Claims — Approval Queue</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;align-items:flex-end;">
        <div>
          <label>Employee</label><br>
          <div style="position:relative;">
            <input id="claims-employee" placeholder="All employees" autocomplete="off" style="padding:7px;min-width:200px;">
            <div id="claims-employee-ac" class="emp-ac-list"></div>
          </div>
        </div>
        <div>
          <label>From</label><br>
          <input id="claims-start" type="date" style="padding:7px;">
        </div>
        <div>
          <label>To</label><br>
          <input id="claims-end" type="date" style="padding:7px;">
        </div>
        <button onclick="loadClaims()" style="padding:7px 16px;">Filter</button>
      </div>
      <div class="table-scroll">
        <table id="claims-table">
          <thead><tr>
            <th>Employee</th><th>Date</th><th>Type</th>
            <th>From</th><th>To</th><th>Mode</th>
            <th>Computed</th><th>Claimed</th><th>Receipt</th>
            <th>GPS</th><th>Status</th><th>Notes</th><th>Actions</th>
          </tr></thead>
          <tbody id="claims-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Tab: Period Sheets -->
    <div id="tab-periods" class="tab-panel" style="display:none;">
      <div class="section-title">Generate Employee Timesheet</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end;">
        <div>
          <label>Employee</label><br>
          <div style="position:relative;">
            <input id="ps-employee" placeholder="Select employee…" autocomplete="off" style="padding:7px;min-width:200px;">
            <div id="ps-employee-ac" class="emp-ac-list"></div>
          </div>
        </div>
        <div>
          <label>Period Start</label><br>
          <input id="ps-start" type="date" style="padding:7px;">
        </div>
        <div>
          <label>Period End</label><br>
          <input id="ps-end" type="date" style="padding:7px;">
        </div>
        <button id="btn-generate" onclick="generatePeriodSheet()" style="padding:8px 18px;">
          Generate
        </button>
        <button onclick="printPeriodSheet(this)" style="padding:8px 18px;">🖨 Print (PDF)</button>
        <button onclick="exportPeriodExcel(this)" style="padding:8px 18px;">⬇ Export Excel</button>
        <button id="save-meal-btn" onclick="saveMealChanges()" style="padding:8px 18px;display:none;">💾 Save Meal Changes</button>
        <button id="save-shift-btn" onclick="saveShiftChangesAdmin()" style="padding:8px 18px;display:none;">💾 Save Shift Changes</button>
      </div>

      <div id="period-sheet-output"></div>
    </div>
  </div>

  <!-- Receipt photo viewer overlay (shared across tabs) -->
  <div id="receipt-modal" onclick="if (event.target === this) closeReceiptModal();"
       style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center;">
    <div style="position:relative;max-width:90vw;max-height:90vh;">
      <button onclick="closeReceiptModal()"
              style="position:absolute;top:-36px;right:0;background:#fff;border:none;border-radius:3px;padding:6px 12px;cursor:pointer;">✕ Close</button>
      <img id="receipt-modal-img" src="" alt="Receipt"
           style="max-width:90vw;max-height:90vh;display:block;border-radius:4px;">
    </div>
  </div>

  <!-- PDF export (Print button) and Excel export (Export button) — the
       app's first external libraries, loaded from CDN. Both are used
       client-side only, no build step: html2canvas + jsPDF render the same
       letterhead/table/signature HTML used for printing into a downloadable
       .pdf; SheetJS (xlsx) converts the timesheet rows into a downloadable
       .xlsx workbook. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="app.js"></script>
  <script>
    // Guard — redirect to login if not a head
    window.addEventListener('DOMContentLoaded', function() {
      var user = requireLogin('head');
      if (!user) return;
      window._pendingMealChanges = {};
      window._pendingShiftTags = {};
      loadUsers();
      initTabs();
      document.getElementById('users-tbody').addEventListener('click', function(ev) {
        var btn = ev.target.closest('.btn-delete-user');
        if (!btn || btn.disabled) return;
        var id = btn.dataset.id, name = btn.dataset.name;
        if (!confirm('Delete ' + name + '? This cannot be undone.')) return;
        btn.disabled = true;
        btn.innerHTML = '<span class="pl-spinner"></span>Deleting…';
        api('deleteUser', { id: id }, function(err) {
          if (err) {
            alert(err.message);
            btn.disabled = false;
            btn.textContent = 'Delete';
            return;
          }
          loadUsers();
        });
      });
      document.getElementById('period-sheet-output').addEventListener('click', function(ev) {
        var mealBtn = ev.target.closest('.meal-deny-btn');
        if (mealBtn) {
          // Flip the button's own label only — no server call here. The
          // actual toggleMealDenial writes are batched up and sent when the
          // admin clicks "Save Meal Changes", since round-tripping (and the
          // subsequent full period-sheet re-fetch) on every single click was
          // too slow for reviewing a whole sheet's rows in sequence.
          var date = mealBtn.dataset.date;
          var nowDenied = mealBtn.dataset.denied !== 'true'; // flip
          // A date with several untagged stray logs repeats the same
          // MEAL CTRL button/status on each of its rows (see buildMealCtrlCell
          // in app.js) — all sharing this same data-date. Update every
          // duplicate, not just the one clicked, so they can't drift out of
          // sync with each other.
          document.querySelectorAll('.meal-deny-btn[data-date="' + date + '"]').forEach(function(btn) {
            btn.dataset.denied = nowDenied;
            btn.textContent = nowDenied ? 'Allow Meal' : 'Deny Meal';
            btn.style.background = nowDenied ? '#b00020' : '#1a1a2e';
          });
          document.querySelectorAll('[data-status-for="' + date + '"]').forEach(function(statusEl) {
            statusEl.textContent = nowDenied ? 'DENIED' : 'ALLOWED';
            statusEl.style.color = nowDenied ? '#b00020' : '#0a7d2c';
          });
          if (window._pendingMealChanges[date]) {
            delete window._pendingMealChanges[date]; // toggled back to original state
          } else {
            window._pendingMealChanges[date] = true;
          }
          updateSaveMealButton();
          return;
        }
        // The fare-claim picker toggle stays clickable in the admin view
        // (useful to see the per-segment breakdown) even though claims
        // themselves are view-only here (claimsInteractive: false, above) —
        // toggleFarePicker (shared, app.js) reads data-interactive itself
        // to decide whether an unclaimed segment gets a "+ Fare" button or
        // plain "Not filed" text.
        var pickerBtn = ev.target.closest('.fare-picker-btn');
        if (pickerBtn) { toggleFarePicker(pickerBtn); return; }
        closeAllFarePickers();
      });
      document.addEventListener('click', function(ev) {
        if (!ev.target.closest('.fare-picker')) closeAllFarePickers();
      });
      // Shift Start/End tagging — admin can also tag/retag on an employee's
      // behalf (product decision: not view-only), batched the same way as
      // index.html's own "Save Shift Changes" button.
      document.getElementById('period-sheet-output').addEventListener('change', function(ev) {
        var sel = ev.target.closest('.shift-tag-select');
        if (!sel) return;
        var ts = sel.dataset.timestamp;
        if (sel.value === sel.dataset.original) {
          delete window._pendingShiftTags[ts];
        } else {
          window._pendingShiftTags[ts] = sel.value;
        }
        updateSaveShiftButtonAdmin();
      });
    });

    function initTabs() {
      document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
          document.querySelectorAll('.tab-panel').forEach(function(p) { p.style.display='none'; });
          btn.classList.add('active');
          document.getElementById('tab-' + btn.dataset.tab).style.display = 'block';
          if (btn.dataset.tab === 'employees') loadUsers();
          if (btn.dataset.tab === 'rates') loadRates();
          if (btn.dataset.tab === 'claims') {
            claimsEmployeeAC.refresh();
            loadClaims();
          }
          if (btn.dataset.tab === 'periods') psEmployeeAC.refresh();
        });
      });
    }

    function loadUsers() {
      var tbody = document.getElementById('users-tbody');
      tbody.innerHTML = '<tr><td colspan="7">' + loadingSpinnerHtml('Loading employees…') + '</td></tr>';
      api('getUsers', {}, function(err, users) {
        if (err) { alert(err.message); return; }
        tbody.innerHTML = '';

        function isActive(u) { return u.active === true || u.active === 'TRUE'; }
        function renderRow(u) {
          var tr = document.createElement('tr');
          tr.innerHTML =
            '<td>' + u.name + '</td>' +
            '<td>' + u.department + '</td>' +
            '<td>' + u.mother_branch + '</td>' +
            '<td>' + u.position_level + '</td>' +
            '<td>' + u.role + '</td>' +
            '<td>' + (u.active ? '✓' : '✗') + '</td>' +
            '<td>' +
              '<button onclick="openUserForm(' + JSON.stringify(u).replace(/"/g,"'") + ')">Edit</button> ' +
              '<button class="btn-delete-user" data-id="' + u.id + '" data-name="' + escapeHtml(u.name) + '" ' +
                (isActive(u) ? 'disabled title="Set Inactive first to enable delete"' : '') +
                ' style="background:#b00020;margin-left:4px;">Delete</button>' +
            '</td>';
          tbody.appendChild(tr);
        }

        // Grouped so the admin can quickly see who's eligible for deletion
        // (Delete is only enabled once an employee is set Inactive — see
        // the click handler below and renderRow's `disabled` gate above).
        [
          { label: 'Active Employees',   list: users.filter(isActive) },
          { label: 'Inactive Employees', list: users.filter(function(u) { return !isActive(u); }) }
        ].forEach(function(group) {
          if (!group.list.length) return;
          var header = document.createElement('tr');
          header.innerHTML = '<td colspan="7" style="background:var(--blue1);font-weight:bold;color:var(--blue2);">' +
            escapeHtml(group.label) + ' (' + group.list.length + ')</td>';
          tbody.appendChild(header);
          group.list.forEach(renderRow);
        });
      });
    }

    var ATTENDANCE_BADGE = {
      'exact':     { cls: 'match-ok',   label: 'Match' },
      'case-only': { cls: 'match-warn', label: 'Close match (letter case differs)' },
      'none':      { cls: 'match-bad',  label: 'No attendance record found' }
    };
    var RATES_BADGE = {
      'employee':      { cls: 'match-ok',   label: 'Has own rate' },
      'dept-fallback': { cls: 'match-warn', label: 'Uses shared department rate' },
      'none':          { cls: 'match-bad',  label: 'No rate found' }
    };

    function checkNameMatches() {
      var btn = document.getElementById('btn-check-names');
      btn.disabled = true;
      btn.innerHTML = '<span class="pl-spinner"></span>Checking…';
      api('checkNameMatches', {}, function(err, result) {
        btn.disabled = false;
        btn.textContent = 'Check Name Matches';
        if (err) { alert(err.message); return; }
        var html = '<table><thead><tr>' +
          '<th>Name</th><th>Dept</th><th>Attendance</th><th>Rates</th>' +
          '</tr></thead><tbody>';
        result.rows.forEach(function(r) {
          var a = ATTENDANCE_BADGE[r.attendance_status];
          var rt = RATES_BADGE[r.rates_status];
          html += '<tr><td>' + r.name + '</td><td>' + r.department + '</td>' +
            '<td><span class="match-badge ' + a.cls + '">' + a.label + '</span></td>' +
            '<td><span class="match-badge ' + rt.cls + '">' + rt.label + '</span></td></tr>';
        });
        html += '</tbody></table>';
        document.getElementById('name-match-results').innerHTML = html;
      });
    }

    function openUserForm(u) {
      document.getElementById('user-form-wrap').style.display = 'block';
      document.getElementById('user-form-title').textContent = u ? 'Edit Employee' : 'Add Employee';
      document.getElementById('uf-id').value     = u ? u.id : '';
      document.getElementById('uf-name').value   = u ? u.name : '';
      document.getElementById('uf-branch').value = u ? u.mother_branch : '';
      document.getElementById('uf-level').value  = u ? u.position_level : 'level_1';
      document.getElementById('uf-role').value   = u ? u.role : 'employee';
      document.getElementById('uf-pin').value    = u ? u.pin : '';
      document.getElementById('uf-active').checked = u ? u.active === true || u.active === 'TRUE' : true;
      document.getElementById('uf-msg').textContent = '';
      setupDepartmentField(u);
    }

    // Department field is either a plain default text input (employee
    // already has employee-specific EmployeeRates rows, per
    // checkNameMatches' rates_status — department doesn't drive their
    // rate lookup, so free text is harmless) or a dropdown of the real
    // department names that have fallback rows in EmployeeRates (new
    // employee, or one relying on department-fallback rates) — same
    // typo-prevention idea as the Area dropdown added to Rate Tables
    // (a Users.department that doesn't exactly match an EmployeeRates
    // fallback row silently zeroes that employee's meal/accom, no error).
    function setupDepartmentField(u) {
      var deptValue = u ? u.department : '';
      api('getRates', {}, function(err, rates) {
        var fallbackDepts = [];
        if (!err) {
          var seen = {};
          (rates.employeeRates || []).forEach(function(r) {
            var isFallback = !r['employee_name'] || r['employee_name'] === '';
            if (isFallback && r['department'] && !seen[r['department']]) {
              seen[r['department']] = true;
              fallbackDepts.push(r['department']);
            }
          });
        }
        if (!u) {
          // Brand-new employee — no rates_status to check yet (they don't
          // exist in EmployeeRates at all). Default to the dropdown so a
          // new hire's department can't be typo'd against the fallback
          // group they'll actually need.
          renderDepartmentDropdown(deptValue, fallbackDepts);
          return;
        }
        api('checkNameMatches', {}, function(err2, result) {
          var row = !err2 && result.rows.filter(function(r) { return r.name === u.name; })[0];
          if (row && row.rates_status === 'employee') {
            renderDepartmentPlain(deptValue);
          } else {
            renderDepartmentDropdown(deptValue, fallbackDepts);
          }
        });
      });
    }

    function renderDepartmentPlain(value) {
      document.getElementById('uf-dept-wrap').innerHTML =
        '<input id="uf-dept" type="text" value="' + escapeHtml(value) + '" style="width:100%;padding:7px;box-sizing:border-box;">';
    }

    function renderDepartmentDropdown(value, fallbackDepts) {
      var opts = fallbackDepts.slice();
      if (value && opts.indexOf(value) === -1) opts.unshift(value); // preserve an existing value even if it's not a recognized fallback dept, rather than silently discarding it
      var html = '<select id="uf-dept" style="width:100%;padding:7px;box-sizing:border-box;">';
      if (!value) html += '<option value="">Select department…</option>';
      html += opts.map(function(d) {
        return '<option value="' + escapeHtml(d) + '"' + (d === value ? ' selected' : '') + '>' + escapeHtml(d) + '</option>';
      }).join('');
      html += '</select>';
      document.getElementById('uf-dept-wrap').innerHTML = html;
    }

    function saveUser() {
      var user = {
        id:             document.getElementById('uf-id').value,
        name:           document.getElementById('uf-name').value.trim(),
        department:     document.getElementById('uf-dept').value.trim(),
        mother_branch:  document.getElementById('uf-branch').value.trim(),
        position_level: document.getElementById('uf-level').value,
        role:           document.getElementById('uf-role').value,
        pin:            document.getElementById('uf-pin').value.trim(),
        active:         document.getElementById('uf-active').checked
      };
      if (!user.name || !user.pin) { alert('Name and PIN are required.'); return; }
      var saveBtn = document.getElementById('btn-save-user');
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<span class="pl-spinner"></span>Saving…';
      api('saveUser', { user: user }, function(err) {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save';
        if (err) { alert(err.message); return; }
        document.getElementById('uf-msg').textContent = 'Saved!';
        loadUsers();
      });
    }

    // ---- Rate Tables ----
    // Config describing each of the 4 editable rate tables: which sheet it
    // maps to, and its columns in header order (key = sheet header name).
    var RATE_TABLES = [
      { sheet: 'EmployeeRates', title: 'Employee Meal & Accommodation Rates', grouped: true, columns: [
        { key: 'employee_name', label: 'Employee' },
        { key: 'department',    label: 'Dept (fallback only)' },
        { key: 'area',          label: 'Area' },
        { key: 'meal_amount',   label: 'Meal ₱' },
        { key: 'accom_amount',  label: 'Accom ₱' },
        { key: 'province',      label: 'Province' },
        { key: 'region',        label: 'Region' }
      ]},
      { sheet: 'MidnightRates', title: 'Midnight Rates', columns: [
        { key: 'label',     label: 'Label' },
        { key: 'from_hour', label: 'From Hour' },
        { key: 'from_min',  label: 'From Min' },
        { key: 'to_hour',   label: 'To Hour' },
        { key: 'to_min',    label: 'To Min' },
        { key: 'amount',    label: 'Amount' }
      ]}
    ];

    // map of sheet -> rates key returned by handleGetRates
    var RATE_DATA_KEY = {
      EmployeeRates: 'employeeRates',
      MidnightRates: 'midnight'
    };

    function loadRates() {
      var wrap = document.getElementById('rates-tables');
      wrap.innerHTML = loadingSpinnerHtml('Loading rate tables…');
      api('getRates', {}, function(err, data) {
        if (err) { alert(err.message); return; }
        // Cached for the EmployeeRates table's searchable Area dropdown —
        // see buildRateRow()/wireAreaAutocomplete() below.
        window._areaCentersList = data.areaCenters || [];
        wrap.innerHTML = '';
        RATE_TABLES.forEach(function(cfg) {
          var rows = data[RATE_DATA_KEY[cfg.sheet]] || [];
          wrap.appendChild(cfg.grouped
            ? buildGroupedEmployeeRateBlock(cfg, rows)
            : buildRateTableBlock(cfg, rows));
        });
      });
    }

    function buildRateTableBlock(cfg, rows) {
      var block = document.createElement('div');
      block.style.marginBottom = '28px';

      var title = document.createElement('div');
      title.className = 'section-title';
      title.textContent = cfg.title;
      block.appendChild(title);

      var scroll = document.createElement('div');
      scroll.className = 'table-scroll';

      var table = document.createElement('table');
      table.id = 'rates-table-' + cfg.sheet;

      var thead = document.createElement('thead');
      var headRow = '<tr>' + cfg.columns.map(function(c) {
        return '<th>' + c.label + '</th>';
      }).join('') + '<th>Actions</th></tr>';
      thead.innerHTML = headRow;
      table.appendChild(thead);

      var tbody = document.createElement('tbody');
      tbody.id = 'rates-tbody-' + cfg.sheet;
      table.appendChild(tbody);
      scroll.appendChild(table);
      block.appendChild(scroll);

      rows.forEach(function(row) { tbody.appendChild(buildRateRow(cfg, row)); });

      var btnRow = document.createElement('div');
      btnRow.style.marginTop = '8px';
      btnRow.style.display = 'flex';
      btnRow.style.gap = '8px';

      var addBtn = document.createElement('button');
      addBtn.textContent = '+ Add row';
      addBtn.onclick = function() { tbody.appendChild(buildRateRow(cfg, {})); };

      var saveBtn = document.createElement('button');
      saveBtn.textContent = 'Save';
      saveBtn.onclick = function() { saveRateTable(cfg); };

      var msg = document.createElement('span');
      msg.id = 'rates-msg-' + cfg.sheet;
      msg.style.color = 'green';
      msg.style.alignSelf = 'center';

      btnRow.appendChild(addBtn);
      btnRow.appendChild(saveBtn);
      btnRow.appendChild(msg);
      block.appendChild(btnRow);

      return block;
    }

    function buildRateRow(cfg, row) {
      var tr = document.createElement('tr');
      // EmployeeRates' Area gets a searchable dropdown (see
      // wireAreaAutocomplete below) instead of free text, since a typo
      // there is exactly what silently zeroed out meal/accom for whole
      // employees before the 2026-07-05 AreaCenters/standardize work.
      // Region/Province are read-only — always derived from whichever
      // Area is picked, never hand-typed, so they can never drift out of
      // sync with AreaCenters again.
      var isEmployeeRates = cfg.sheet === 'EmployeeRates';
      tr.innerHTML = cfg.columns.map(function(c) {
        var val = row[c.key] !== undefined && row[c.key] !== null ? row[c.key] : '';
        var escaped = String(val).replace(/"/g, '&quot;');
        if (isEmployeeRates && c.key === 'area') {
          return '<td style="position:relative;">' +
                   '<input type="text" data-key="area" autocomplete="off" value="' + escaped + '" style="width:100%;box-sizing:border-box;">' +
                   '<div class="emp-ac-list area-ac-list"></div>' +
                 '</td>';
        }
        if (isEmployeeRates && (c.key === 'region' || c.key === 'province')) {
          return '<td><input type="text" data-key="' + c.key + '" value="' + escaped + '" readonly style="width:100%;box-sizing:border-box;background:#f0f0f0;"></td>';
        }
        return '<td><input type="text" data-key="' + c.key + '" value="' + escaped + '" style="width:100%;box-sizing:border-box;"></td>';
      }).join('') + '<td><button onclick="this.closest(\'tr\').remove()">Delete</button></td>';
      if (isEmployeeRates) wireAreaAutocomplete(tr);
      return tr;
    }

    // Wires the searchable Area dropdown inside one EmployeeRates <tr>:
    // typing filters window._areaCentersList (loaded once in loadRates()),
    // and picking a suggestion fills that same row's read-only
    // Region/Province inputs from the matched AreaCenters entry.
    function wireAreaAutocomplete(tr) {
      var input = tr.querySelector('input[data-key="area"]');
      var list  = tr.querySelector('.area-ac-list');
      if (!input || !list) return;
      var regionInput   = tr.querySelector('input[data-key="region"]');
      var provinceInput = tr.querySelector('input[data-key="province"]');

      function render(filterText) {
        var q = (filterText || '').trim().toLowerCase();
        var areas = window._areaCentersList || [];
        var matches = areas.filter(function(a) { return !q || String(a.area).toLowerCase().indexOf(q) !== -1; });
        if (!matches.length) { list.style.display = 'none'; return; }
        list.innerHTML = matches.slice(0, 50).map(function(a) {
          return '<div class="emp-ac-item" data-area="' + escapeHtml(a.area) + '" data-region="' + escapeHtml(a.region) + '" data-province="' + escapeHtml(a.province) + '">' +
                   '<b>' + escapeHtml(a.area) + '</b>' +
                   '<small>' + escapeHtml(a.region) + (a.province ? ' · ' + escapeHtml(a.province) : '') + '</small>' +
                 '</div>';
        }).join('');
        list.style.display = 'block';
      }

      input.addEventListener('input', function() { render(input.value); });
      input.addEventListener('focus', function() { render(input.value); });
      input.addEventListener('blur', function() {
        setTimeout(function() { list.style.display = 'none'; }, 150);
      });
      list.addEventListener('mousedown', function(ev) {
        var item = ev.target.closest('.emp-ac-item');
        if (!item) return;
        input.value = item.dataset.area;
        if (regionInput)   regionInput.value = item.dataset.region;
        if (provinceInput) provinceInput.value = item.dataset.province;
        list.style.display = 'none';
      });
    }

    function saveRateTable(cfg) {
      var tbody = document.getElementById('rates-tbody-' + cfg.sheet);
      var rows = [].slice.call(tbody.querySelectorAll('tr')).map(function(tr) {
        var row = {};
        tr.querySelectorAll('input[data-key]').forEach(function(input) {
          row[input.dataset.key] = input.value;
        });
        return row;
      });
      api('saveRates', { sheet: cfg.sheet, rows: rows }, function(err) {
        var msg = document.getElementById('rates-msg-' + cfg.sheet);
        if (err) { alert(err.message); return; }
        if (msg) {
          msg.textContent = 'Saved!';
          setTimeout(function() { msg.textContent = ''; }, 2000);
        }
      });
    }

    // Renders EmployeeRates grouped into one collapsible <details> block per
    // employee (plus a separate group per department for fallback rows), with
    // a name-filter search box. Each block has its own small <table> — NOT one
    // shared flat table — so 300+ rows stay navigable. "Save All" collects
    // every <tr> across every block's table and sends them in one saveRates
    // call, mirroring the flat-table path's flattening logic.
    function buildGroupedEmployeeRateBlock(cfg, rows) {
      var block = document.createElement('div');
      block.style.marginBottom = '28px';

      var title = document.createElement('div');
      title.className = 'section-title';
      title.textContent = cfg.title;
      block.appendChild(title);

      var search = document.createElement('input');
      search.type = 'text';
      search.placeholder = 'Filter by employee or department…';
      search.style.cssText = 'width:100%;padding:7px;margin-bottom:10px;box-sizing:border-box;';
      block.appendChild(search);

      var accordion = document.createElement('div');
      accordion.id = 'rates-employee-accordion';
      block.appendChild(accordion);

      // Group rows: employee-specific rows keyed by employee_name;
      // department-fallback rows (blank employee_name) keyed by
      // '[DEPT] ' + department, kept visually distinct from employee groups.
      var groups = {}; // key -> { label, employee_name, department, rows: [] }
      rows.forEach(function(row) {
        var isFallback = !row['employee_name'] || row['employee_name'] === '';
        var key = isFallback ? ('[DEPT] ' + row['department']) : row['employee_name'];
        if (!groups[key]) {
          groups[key] = {
            label: isFallback ? ('Department fallback: ' + row['department']) : row['employee_name'],
            employee_name: isFallback ? '' : row['employee_name'],
            department: isFallback ? row['department'] : '',
            rows: []
          };
        }
        groups[key].rows.push(row);
      });

      Object.keys(groups).sort().forEach(function(key) {
        accordion.appendChild(buildEmployeeRateGroup(cfg, groups[key]));
      });

      search.addEventListener('input', function() {
        var q = search.value.trim().toLowerCase();
        accordion.querySelectorAll('details.employee-rate-block').forEach(function(d) {
          var label = d.querySelector('summary').textContent.toLowerCase();
          d.style.display = (!q || label.indexOf(q) !== -1) ? '' : 'none';
        });
      });

      var btnRow = document.createElement('div');
      btnRow.style.cssText = 'margin-top:8px;display:flex;gap:8px;';

      var addEmpBtn = document.createElement('button');
      addEmpBtn.textContent = '+ Add new employee block';
      addEmpBtn.onclick = function() {
        var name = prompt('Employee name (must match Users sheet exactly):');
        if (!name) return;
        accordion.appendChild(buildEmployeeRateGroup(cfg, { label: name, employee_name: name, department: '', rows: [] }));
      };

      var addDeptBtn = document.createElement('button');
      addDeptBtn.textContent = '+ Add new department fallback block';
      addDeptBtn.onclick = function() {
        var dept = prompt('Department name (must match Users.department exactly):');
        if (!dept) return;
        accordion.appendChild(buildEmployeeRateGroup(cfg, { label: 'Department fallback: ' + dept, employee_name: '', department: dept, rows: [] }));
      };

      var saveBtn = document.createElement('button');
      saveBtn.id = 'btn-save-rates-' + cfg.sheet;
      saveBtn.textContent = 'Save All';
      saveBtn.onclick = function() { saveGroupedEmployeeRates(cfg); };

      var msg = document.createElement('span');
      msg.id = 'rates-msg-' + cfg.sheet;
      msg.style.cssText = 'color:green;align-self:center;';

      btnRow.appendChild(addEmpBtn);
      btnRow.appendChild(addDeptBtn);
      btnRow.appendChild(saveBtn);
      btnRow.appendChild(msg);
      block.appendChild(btnRow);

      return block;
    }

    function buildEmployeeRateGroup(cfg, group) {
      var details = document.createElement('details');
      details.className = 'employee-rate-block';
      details.style.cssText = 'border:1px solid #ddd;border-radius:6px;margin-bottom:6px;padding:6px 10px;';

      var summary = document.createElement('summary');
      summary.textContent = group.label + ' (' + group.rows.length + ' area' + (group.rows.length === 1 ? '' : 's') + ')';
      summary.style.cursor = 'pointer';
      details.appendChild(summary);

      var table = document.createElement('table');
      table.style.marginTop = '8px';
      var thead = document.createElement('thead');
      thead.innerHTML = '<tr>' + cfg.columns.map(function(c) { return '<th>' + c.label + '</th>'; }).join('') + '<th>Actions</th></tr>';
      table.appendChild(thead);
      var tbody = document.createElement('tbody');
      table.appendChild(tbody);
      details.appendChild(table);

      group.rows.forEach(function(row) { tbody.appendChild(buildRateRow(cfg, row)); });

      var addRowBtn = document.createElement('button');
      addRowBtn.textContent = '+ Add area row';
      addRowBtn.style.marginTop = '6px';
      addRowBtn.onclick = function() {
        // Pre-fill employee_name/department so a new row can't end up
        // unscoped (neither field set) by accident.
        tbody.appendChild(buildRateRow(cfg, { employee_name: group.employee_name, department: group.department }));
      };
      details.appendChild(addRowBtn);

      return details;
    }

    function saveGroupedEmployeeRates(cfg) {
      var accordion = document.getElementById('rates-employee-accordion');
      var rows = [].slice.call(accordion.querySelectorAll('tbody tr')).map(function(tr) {
        var row = {};
        tr.querySelectorAll('input[data-key]').forEach(function(input) {
          row[input.dataset.key] = input.value;
        });
        return row;
      });
      var saveBtn = document.getElementById('btn-save-rates-' + cfg.sheet);
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<span class="pl-spinner"></span>Saving…';
      api('saveRates', { sheet: cfg.sheet, rows: rows }, function(err) {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save All';
        var msg = document.getElementById('rates-msg-' + cfg.sheet);
        if (err) { alert(err.message); return; }
        if (msg) {
          msg.textContent = 'Saved!';
          setTimeout(function() { msg.textContent = ''; }, 2000);
        }
      });
    }

    // ---- Approve Claims ----
    // Approved/Rejected rows stay visible after an in-place update (see
    // approveReject() below) instead of vanishing on refresh, so the
    // Status badge must reflect the claim's actual status, not always
    // "pending" (harmless before this change, since every row loaded here
    // was always status==='Submitted').
    function statusBadgeClass(status) {
      if (status === 'Approved') return 'badge-approved';
      if (status === 'Rejected') return 'badge-rejected';
      return 'badge-pending';
    }

    function loadClaims() {
      var payload = { status: 'Submitted' };
      var emp   = document.getElementById('claims-employee').value;
      var start = document.getElementById('claims-start').value;
      var end   = document.getElementById('claims-end').value;
      if (emp)   payload.employee_name = emp;
      if (start) payload.date_start = start;
      if (end)   payload.date_end   = end;
      api('getClaims', payload, function(err, claims) {
        if (err) { alert(err.message); return; }
        // Sorted by employee, then date within each employee, for easier
        // review of one employee's claims together.
        claims.sort(function(a, b) {
          if (a.employee_name !== b.employee_name) return a.employee_name < b.employee_name ? -1 : 1;
          return a.date < b.date ? -1 : (a.date > b.date ? 1 : 0);
        });
        var tbody = document.getElementById('claims-tbody');
        tbody.innerHTML = '';
        window._lastClaims = claims; // keyed lookup for viewReceipt(), avoids inlining base64 into onclick
        if (!claims.length) {
          tbody.innerHTML = '<tr><td colspan="13" style="text-align:center;">No pending claims.</td></tr>';
          return;
        }
        claims.forEach(function(c) {
          var tr = document.createElement('tr');
          // Lets approveReject() find and update this exact row in place
          // afterward, instead of reloading (which would drop it, since
          // the default query above is always status:'Submitted').
          tr.setAttribute('data-row-id', c.id);
          var actionsCell = c.status === 'Submitted'
            ? '<button onclick="approveReject(\'' + c.id + '\',\'approve\')" style="background:#27ae60;color:#fff;border:none;padding:4px 10px;border-radius:3px;cursor:pointer;margin-right:4px;">✓ Approve</button>' +
              '<button onclick="approveReject(\'' + c.id + '\',\'reject\')" style="background:#e74c3c;color:#fff;border:none;padding:4px 10px;border-radius:3px;cursor:pointer;">✗ Reject</button>'
            : '';
          tr.innerHTML =
            '<td>' + escapeHtml(c.employee_name) + '</td>' +
            '<td>' + escapeHtml(c.date) + '</td>' +
            '<td>' + escapeHtml(c.type) + '</td>' +
            '<td>' + escapeHtml(c.from_loc) + '</td>' +
            '<td>' + escapeHtml(c.to_loc) + '</td>' +
            '<td>' + escapeHtml(c.vehicle_mode) + '</td>' +
            '<td>' + formatCurrency(c.computed_amount) + '</td>' +
            // Editable so the admin can correct a wrong submitted amount
            // before approving; value is numeric (not employee-authored
            // free text), so plain interpolation matches this file's
            // existing formatCurrency()-not-escapeHtml() convention for
            // amount fields.
            '<td><input type="number" class="claim-amount-input" data-claim-id="' + c.id + '" value="' + Number(c.claimed_amount || 0) + '" style="width:80px;padding:3px;"></td>' +
            '<td>' + (c.receipt_url ? '<button onclick="viewReceipt(\'' + c.id + '\')" style="padding:4px 8px;">📷 View</button>' : '—') + '</td>' +
            '<td><span class="badge-' + (c.gps_check==='ok'?'auto':'flagged') + '">' + escapeHtml(c.gps_check) + '</span></td>' +
            '<td><span class="' + statusBadgeClass(c.status) + '">' + escapeHtml(c.status) + '</span></td>' +
            '<td>' + escapeHtml(c.notes) + '</td>' +
            // c.id is server-generated ('C' + Date.now(), see handleSaveClaim) —
            // always plain digits/letters, never employee-authored text, so it's
            // safe to interpolate into the onclick string literal as-is.
            // (escapeHtml() would NOT actually help here even if id were
            // untrusted: browsers HTML-decode attribute values before parsing
            // onclick as JS, so an escaped &#39; would just decode back to '
            // and still close the string early — this sink needs a different
            // defense than HTML-entity escaping.)
            '<td style="white-space:nowrap;">' + actionsCell + '</td>';
          tbody.appendChild(tr);
        });
      });
    }

    function approveReject(claimId, action) {
      var user = currentUser();
      var notes = action === 'reject' ? prompt('Reason for rejection:') : '';
      // NOTE: sent as "decision", not "action" — api() merges this object's
      // keys on top of {action: 'approveClaim'} (the dispatch key), so a
      // same-named "action" key here would silently overwrite the dispatch
      // value before doPost ever sees it, breaking the request entirely.
      var payload = {
        claim_id: claimId,
        approver_name: user.name,
        decision: action,
        notes: notes || ''
      };
      // Only Approve carries the (possibly-edited) claimed amount along —
      // a Reject leaves the originally-submitted amount untouched, since
      // nothing is being paid out for a rejected claim.
      if (action === 'approve') {
        var input = document.querySelector('.claim-amount-input[data-claim-id="' + claimId + '"]');
        if (input) payload.claimed_amount = Number(input.value);
      }
      api('approveClaim', payload, function(err) {
        if (err) { alert(err.message); return; }
        // Update this row in place rather than calling loadClaims() again —
        // a full reload re-queries status:'Submitted' only, which would
        // make the row the admin just acted on disappear immediately
        // instead of showing its new status.
        var newStatus = action === 'approve' ? 'Approved' : 'Rejected';
        var tr = document.querySelector('tr[data-row-id="' + claimId + '"]');
        if (tr) {
          var cells = tr.querySelectorAll('td');
          cells[10].innerHTML = '<span class="' + statusBadgeClass(newStatus) + '">' + newStatus + '</span>';
          cells[12].innerHTML = ''; // Actions cell — nothing left to act on
        }
      });
    }

    function viewReceipt(claimId) {
      var claim = (window._lastClaims || []).find(function(c) { return c.id === claimId; });
      if (!claim || !claim.receipt_url) return;
      document.getElementById('receipt-modal-img').src = claim.receipt_url;
      document.getElementById('receipt-modal').style.display = 'flex';
    }

    function closeReceiptModal() {
      document.getElementById('receipt-modal').style.display = 'none';
      document.getElementById('receipt-modal-img').src = ''; // drop the base64 payload, don't keep it around in the DOM
    }

    // ---- Period Sheets ----
    // Shared by the Period Sheets tab (#ps-employee) and the Approve Claims
    // tab (#claims-employee). A plain native <datalist> dropdown can't be
    // styled at all (it's rendered outside the page by the browser/OS, so
    // it never matches the app's look) — this builds a small custom
    // autocomplete instead: a text input plus a styled <div> list
    // (.emp-ac-list in style.css) that this function filters and renders
    // itself. Returns a controller object with a `refresh()` method the
    // caller uses to (re)fetch the active employee list — matches the
    // existing per-tab-activation refresh pattern.
    function setupEmployeeAutocomplete(inputId, listId) {
      var input = document.getElementById(inputId);
      var list  = document.getElementById(listId);
      var users = [];

      function render(filterText) {
        var q = (filterText || '').trim().toLowerCase();
        var matches = users.filter(function(u) {
          return !q || u.name.toLowerCase().indexOf(q) !== -1 ||
                 String(u.department).toLowerCase().indexOf(q) !== -1;
        });
        if (!matches.length) { list.style.display = 'none'; return; }
        list.innerHTML = matches.map(function(u) {
          return '<div class="emp-ac-item" data-name="' + escapeHtml(u.name) + '">' +
                   '<b>' + escapeHtml(u.name) + '</b>' +
                   '<small>' + escapeHtml(u.name) + ' (' + escapeHtml(u.department) + ')</small>' +
                 '</div>';
        }).join('');
        list.style.display = 'block';
      }

      input.addEventListener('input', function() { render(input.value); });
      input.addEventListener('focus', function() { render(input.value); });
      input.addEventListener('blur', function() {
        // Delay hiding so a mousedown on a list item (below) registers
        // before the list disappears out from under it.
        setTimeout(function() { list.style.display = 'none'; }, 150);
      });
      list.addEventListener('mousedown', function(ev) {
        var item = ev.target.closest('.emp-ac-item');
        if (!item) return;
        input.value = item.dataset.name;
        list.style.display = 'none';
      });

      return {
        refresh: function() {
          api('getUsers', {}, function(err, data) {
            if (err) return;
            users = data.filter(function(u) { return u.active === true || u.active === 'TRUE'; });
          });
        }
      };
    }

    var claimsEmployeeAC = setupEmployeeAutocomplete('claims-employee', 'claims-employee-ac');
    var psEmployeeAC     = setupEmployeeAutocomplete('ps-employee', 'ps-employee-ac');

    function generatePeriodSheet() {
      var emp   = document.getElementById('ps-employee').value;
      var start = document.getElementById('ps-start').value;
      var end   = document.getElementById('ps-end').value;
      if (!emp || !start || !end) { alert('Select employee and period dates.'); return; }

      var out = document.getElementById('period-sheet-output');
      out.innerHTML = loadingSpinnerHtml('Loading employee timesheet…');
      window._pendingMealChanges = {};
      updateSaveMealButton();
      window._pendingShiftTags = {};
      updateSaveShiftButtonAdmin();

      var genBtn = document.getElementById('btn-generate');
      genBtn.disabled = true;
      genBtn.innerHTML = '<span class="pl-spinner"></span>Generating…';

      api('getPeriodSheet', { employee_name: emp, period_start: start, period_end: end },
        function(err, sheet) {
          genBtn.disabled = false;
          genBtn.textContent = 'Generate';
          if (err) { out.innerHTML = '<p style="color:red;">' + escapeHtml(err.message) + '</p>'; return; }
          window._lastPeriodSheet = sheet;
          out.innerHTML = renderPeriodSheet(sheet, { employeeControls: true, adminControls: true, claimsInteractive: false });
        }
      );
    }

    function updateSaveMealButton() {
      var btn = document.getElementById('save-meal-btn');
      var count = Object.keys(window._pendingMealChanges).length;
      btn.style.display = count ? 'inline-block' : 'none';
      btn.textContent = '💾 Save Meal Changes (' + count + ')';
    }

    function saveMealChanges() {
      var dates = Object.keys(window._pendingMealChanges);
      if (!dates.length) return;
      var u = currentUser();
      var empName = window._lastPeriodSheet.employee.name;
      var btn = document.getElementById('save-meal-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="pl-spinner"></span>Saving ' + dates.length + ' change' + (dates.length === 1 ? '' : 's') + '…';
      var remaining = dates.length;
      var errors = [];
      dates.forEach(function(date) {
        api('toggleMealDenial', { employee_name: empName, date: date, denied_by: u.name },
          function(err) {
            if (err) errors.push(date + ': ' + err.message);
            remaining--;
            if (remaining === 0) {
              btn.disabled = false;
              btn.textContent = '💾 Save Meal Changes';
              if (errors.length) alert('Some meal changes failed to save:\n' + errors.join('\n'));
              generatePeriodSheet(); // refresh once, shows the saved server state + updated totals
            }
          }
        );
      });
    }

    function updateSaveShiftButtonAdmin() {
      var btn = document.getElementById('save-shift-btn');
      var count = Object.keys(window._pendingShiftTags).length;
      btn.style.display = count ? 'inline-block' : 'none';
      btn.textContent = '💾 Save Shift Changes (' + count + ')';
    }

    function saveShiftChangesAdmin() {
      var timestamps = Object.keys(window._pendingShiftTags);
      if (!timestamps.length) return;
      // The viewed employee, NOT the logged-in admin — currentUser() would
      // target the wrong person here, unlike index.html's own
      // saveShiftChanges() where the viewer and the sheet's owner are
      // always the same person.
      var empName = window._lastPeriodSheet.employee.name;
      var btn = document.getElementById('save-shift-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="pl-spinner"></span>Saving ' + timestamps.length + ' change' + (timestamps.length === 1 ? '' : 's') + '…';
      var tags = timestamps.map(function(ts) {
        return { timestamp: ts, role: window._pendingShiftTags[ts] };
      });
      api('saveShiftTags', { employee_name: empName, tags: tags }, function(err) {
        if (err) {
          btn.disabled = false;
          updateSaveShiftButtonAdmin();
          alert(err.message);
          return;
        }
        window._pendingShiftTags = {};
        btn.textContent = '💾 Save Shift Changes';
        generatePeriodSheet(); // refresh once, shows the saved server state + updated totals
      });
    }

    // printPeriodSheet() and exportPeriodExcel() moved to shared app.js
    // (both admin.html and index.html need them now). The admin Print/Export
    // buttons call the shared versions with `this` for the spinner state.
  </script>
</body>
